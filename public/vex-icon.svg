<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#070e2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="14" y1="22" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3b66f6" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#3b66f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- subtle inner ring -->
  <rect x="3" y="3" width="58" height="58" rx="12" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="1.2"/>

  <!-- bold V mark -->
  <path d="M14 18 L32 50 L50 18"
        fill="none"
        stroke="url(#gold)"
        stroke-width="7.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- accent dot -->
  <circle cx="32" cy="50" r="3.2" fill="#fde68a"/>
</svg>
